<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pen Plotter Studio</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="rail">
        <header class="brand">
          <div class="brand-lockup">
            <div class="mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 17.5c3.2-8 6.2-8 9.4 0 2.1 5.3 4.2 4.3 6.6-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M5 5h14M5 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".55" />
              </svg>
            </div>
            <div>
              <h1>Pen Plotter Studio</h1>
              <p>Generative paths to SVG and GCode</p>
            </div>
          </div>
          <span class="status-dot" aria-hidden="true"></span>
        </header>

        <section class="panel">
          <div class="panel-head">
            <h2>Paper</h2>
            <span class="chip">A4 portrait</span>
          </div>
          <div class="paper-metrics" aria-label="Current paper dimensions">
            <div class="metric">
              <span>Width</span>
              <strong id="metric-width">210</strong>
            </div>
            <div class="metric">
              <span>Height</span>
              <strong id="metric-height">297</strong>
            </div>
            <div class="metric">
              <span>Margin</span>
              <strong id="metric-margin">15</strong>
            </div>
          </div>
          <div id="paper-controls"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Generator</h2>
            <span class="muted">Layer 1</span>
          </div>
          <div id="generator-tabs" class="generator-tabs" aria-label="Generator shortcuts"></div>
          <label class="field">
            <span>Type</span>
            <select id="generator-select"></select>
          </label>
          <div id="generator-controls"></div>
          <div id="image-controls"></div>
          <div id="color-controls"></div>
          <div class="row">
            <button id="btn-randomize" class="secondary">Randomize seed</button>
            <button id="btn-generate">Generate</button>
          </div>
        </section>
      </aside>

      <main id="stage">
        <header class="stagebar">
          <div>
            <h2 id="drawing-title">untitled.gcode</h2>
            <p id="drawing-subtitle">Optimized preview</p>
          </div>
          <div class="tool-strip" aria-label="Preview options">
            <button class="icon-button active" type="button" title="Ink paths">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 17c3-4 5-4 8 0s5 4 8 0M4 12c3-3 5-3 8 0s5 3 8 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </button>
            <label class="icon-button toggle-button" title="Show travel moves">
              <input type="checkbox" id="opt-show-travel" />
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 19L19 5M6 6h.1M18 18h.1" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </label>
          </div>
        </header>
        <section class="canvas-shell">
          <div class="paper-frame">
            <canvas id="preview"></canvas>
            <div class="paper-guide" aria-hidden="true"></div>
            <span class="axis-label axis-x" id="axis-width">210 mm</span>
            <span class="axis-label axis-y" id="axis-height">297 mm</span>
          </div>
          <div class="layer-badge">
            <span id="layer-color" class="layer-color"></span>
            <div>
              <span>Active layer</span>
              <strong id="layer-label">No drawing yet</strong>
            </div>
          </div>
        </section>
        <footer class="stage-footer">
          <label class="pill">
            <input type="checkbox" id="opt-optimize" checked />
            <span>Optimize travel</span>
          </label>
          <span class="pill">Canvas scale auto</span>
        </footer>
      </main>

      <aside id="inspector" class="rail">
        <section class="panel">
          <div class="panel-head">
            <h2>Output</h2>
            <span class="chip">Ready</span>
          </div>
          <div id="stats" class="stats">No drawing yet.</div>
          <div class="row">
            <button id="btn-export-svg" class="secondary">Export SVG</button>
            <button id="btn-export-gcode">Export GCode</button>
          </div>
        </section>

        <section class="panel">
          <h2>Machine profile</h2>
          <div id="profile-controls"></div>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
