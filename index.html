<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pen Plotter Studio</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <div class="brand-lockup">
            <img class="mark" src="/app-icon.png" alt="" aria-hidden="true" />
            <div data-tauri-drag-region>
              <h1>Pen Plotter Studio</h1>
              <p>Generative paths to SVG and GCode</p>
            </div>
          </div>
          <span class="status-dot" aria-hidden="true"></span>
        </div>

        <div class="header-context" data-tauri-drag-region>
          <div class="document-row" data-tauri-drag-region>
            <div class="file-menu-wrap">
              <button id="btn-file-menu" class="file-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">
                File
                <span aria-hidden="true">&#9662;</span>
              </button>
              <div id="file-menu" class="file-menu" role="menu" hidden>
                <button id="file-new" type="button" role="menuitem">New</button>
                <button id="file-open" type="button" role="menuitem">Open...</button>
                <span class="file-menu-separator" aria-hidden="true"></span>
                <button id="file-save" type="button" role="menuitem">Save</button>
                <button id="file-save-as" type="button" role="menuitem">Save As...</button>
              </div>
              <input id="project-open-input" type="file" accept=".ppstudio,application/json" hidden />
            </div>
            <input id="document-name" class="document-name" value="untitled" aria-label="Document name" />
          </div>
          <p id="drawing-subtitle">Optimized preview</p>
        </div>

        <div class="header-actions" data-tauri-drag-region>
          <div class="window-controls" aria-label="Window controls">
            <button id="btn-window-minimize" class="window-button" type="button" title="Minimize">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M3 8h10" />
              </svg>
            </button>
            <button id="btn-window-maximize" class="window-button" type="button" title="Maximize">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M4.5 4.5h7v7h-7z" />
              </svg>
            </button>
            <button id="btn-window-close" class="window-button close" type="button" title="Close">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M4.5 4.5l7 7M11.5 4.5l-7 7" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <aside id="sidebar" class="rail">
        <section class="panel">
          <div class="panel-head">
            <h2>Paper</h2>
            <span class="chip">A4 portrait</span>
          </div>
          <div class="paper-metrics" aria-label="Current paper dimensions">
            <div class="metric">
              <span>Width</span>
              <strong id="metric-width">210</strong>
            </div>
            <div class="metric">
              <span>Height</span>
              <strong id="metric-height">297</strong>
            </div>
            <div class="metric">
              <span>Margin</span>
              <strong id="metric-margin">15</strong>
            </div>
          </div>
          <div id="paper-controls"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Generator</h2>
            <span class="muted">Layer 1</span>
          </div>
          <div id="generator-tabs" class="generator-tabs" aria-label="Generator shortcuts"></div>
          <label class="field">
            <span>Type</span>
            <select id="generator-select"></select>
          </label>
          <div id="generator-controls"></div>
          <div id="image-controls"></div>
          <div id="color-controls"></div>
          <div class="button-row">
            <button id="btn-randomize" class="secondary">Randomize seed</button>
            <button id="btn-surprise" class="secondary">Surprise me</button>
          </div>
        </section>
      </aside>

      <main id="stage">
        <section class="canvas-shell">
          <div class="paper-frame">
            <canvas id="preview"></canvas>
            <div class="paper-guide" aria-hidden="true"></div>
            <span class="axis-label axis-x" id="axis-width">210 mm</span>
            <span class="axis-label axis-y" id="axis-height">297 mm</span>
          </div>
          <div class="layer-badge">
            <span id="layer-color" class="layer-color"></span>
            <div>
              <span>Active layer</span>
              <strong id="layer-label">No drawing yet</strong>
            </div>
          </div>
          <div id="render-busy" class="render-busy" hidden>
            <div class="spinner" aria-hidden="true"></div>
            <div>
              <strong id="render-busy-title">Rendering</strong>
              <span id="render-busy-detail">Estimating time...</span>
            </div>
          </div>
        </section>
        <footer class="stage-footer">
          <label class="pill">
            <input type="checkbox" id="opt-optimize" checked />
            <span>Optimize travel</span>
          </label>
          <span class="pill">Canvas scale auto</span>
        </footer>
      </main>

      <aside id="inspector" class="rail">
        <section class="panel">
          <h2>Output</h2>
          <div id="stats" class="stats">No drawing yet.</div>
          <div class="row">
            <button id="btn-export-svg" class="secondary">Export SVG</button>
            <button id="btn-export-gcode">Export GCode</button>
          </div>
        </section>

        <section class="panel">
          <h2>Machine profile</h2>
          <div id="profile-controls"></div>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
